name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger from Actions tab

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ──────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Install NDK 27 + CMake 3.22 ─────────────────────────────────────
      - name: Install NDK and CMake
        run: |
          sdkmanager \
            "ndk;27.2.12479018" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      # ── 5. Bootstrap gradle-wrapper.jar if missing ──────────────────────────
      # The binary jar cannot be committed easily; we generate it with the
      # system Gradle, then all subsequent ./gradlew calls work normally.
      - name: Bootstrap Gradle wrapper jar
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found — bootstrapping with system gradle"
            # Install gradle 8.2 via SDKMAN
            curl -s "https://get.sdkman.io" | bash
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            sdk install gradle 8.2
            gradle wrapper --gradle-version=8.2 --distribution-type=bin
            echo "✓ gradle-wrapper.jar generated"
          else
            echo "✓ gradle-wrapper.jar already present"
          fi

      # ── 6. Cache Gradle downloads ────────────────────────────────────────────
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 7. Cache CMake FetchContent (tinyobjloader, tinygltf) ───────────────
      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cxx-${{ runner.os }}-

      # ── 8. Make gradlew executable ───────────────────────────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      # ── 9. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=27.2.12479018

      # ── 10. Build Release APK (unsigned) ─────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=27.2.12479018

      # ── 11. Show output APKs ─────────────────────────────────────────────────
      - name: List built APKs
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      # ── 12. Upload Debug APK ─────────────────────────────────────────────────
      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DModelViewer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 13. Upload Release APK ───────────────────────────────────────────────
      - name: Upload Release APK artifact (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: 3DModelViewer-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 14. GitHub Release on version tag ────────────────────────────────────
      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
